<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<link rel="icon" type="image/png" href="/Gymkak/assets/logo_w.png" />
	<link href="https://cdn.jsdelivr.net/npm/remixicon@3.4.0/fonts/remixicon.css" rel="stylesheet" />
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet"
		integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
	<link rel="stylesheet" href="login.css" />
	<title>Login | Gymkak</title>
</head>

<body class="auth-body">
	<header class="main-header">
		<nav class="nav">
			<div class="nav__logo">
				<a href="#" onclick="return false;"><img src="/Gymkak/assets/Logo main color w.png" alt="logo" /></a>
			</div>
			<div class="nav__cta">
				<a class="btn-ghost delay-link" href="/Gymkak/src/user/login/register.html">Register</a>
			</div>
		</nav>
	</header>

	<main class="auth-main">
		<section class="auth-card">
			<div class="auth-header">
				<span class="auth-badge"><i class="ri-login-circle-line"></i> Secure Login</span>
				<h1>เข้าสู่ระบบ</h1>
				<p>ยินดีต้อนรับกลับมา เข้าสู่ระบบเพื่อดูโปรแกรมฝึกและแผนโภชนาการของคุณ</p>
			</div>

			<form class="auth-form">
				<div class="form-group">
					<label for="loginEmail">ชื่อผู้ใช้</label>
					<div class="input-wrap">
						<i class="ri-user-3-line"></i>
						<input type="text" id="loginEmail" placeholder="admin" required />
					</div>
				</div>

				<div class="form-group">
					<label for="loginPassword">รหัสผ่าน</label>
					<div class="input-wrap">
						<i class="ri-lock-2-line"></i>
						<input type="password" id="loginPassword" placeholder="รหัสผ่านของคุณ" required />
					</div>
				</div>

				<div class="form-row">
					<label class="remember">
						<input type="checkbox" />
						<span>จดจำฉัน</span>
					</label>
					<a class="link-muted delay-link" href="reset-password.html">ลืมรหัสผ่าน?</a>
				</div>

				<button type="submit" class="btn-primary full">เข้าสู่ระบบ</button>
				<p class="form-foot">ยังไม่มีบัญชี? <a class="delay-link" href="/Gymkak/src/user/login/register.html">สมัครสมาชิก</a></p>
			</form>
		</section>
	</main>

	<div id="loginLoader" class="login-loader" aria-live="polite" aria-hidden="true">
		<div class="loader-card">
			<span class="loader-spinner" aria-hidden="true"></span>
			<p>กำลังเข้าสู่ระบบ...</p>
		</div>
	</div>

	<script src="login.js"></script>
</body>

</html>
