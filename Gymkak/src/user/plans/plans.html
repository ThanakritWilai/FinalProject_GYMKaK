<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/Gymkak/assets/logo_w.png" />
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.4.0/fonts/remixicon.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
    <link rel="stylesheet" href="plans.css" />
    <title>My Plans - Gymkak</title>
</head>

<body>
    <nav>
        <div class="nav__logo">
            <a href="/Gymkak/src/dashboard/dashboard.html"><img src="/Gymkak/assets/Logo main color w.png"
                    alt="logo" /></a>
        </div>
        <ul class="nav__links">
            <li class="link"><a href="/Gymkak/src/dashboard/dashboard.html">Home</a></li>
            <li class="link"><a href="/Gymkak/src/dashboard/dashboard.html#program">Program</a></li>
            <li class="link"><a href="/Gymkak/src/membership/regisgym/regisgym.html">Membership</a></li>
            <li class="link"><a href="/Gymkak/src/bodyanalysis/bodyanalysis.html">Bodyanalysis</a></li>
            <li class="link"><a href="/Gymkak/src/dashboard/dashboard.html#about">About</a></li>
        </ul>
        <div class="dropdown-container" style="position: relative; margin-left: 1.5rem;">
            <button class="btn redesigned-menu" id="menuButton"
                style="background: var(--primary-color-extra-light); color: var(--white); border-radius: 10px; box-shadow: 0 3px 16px rgba(0,0,0,0.16); padding: 0.48rem 1.05rem; font-size: 0.97rem; font-weight: 600; border: none; letter-spacing: 0.4px; display: flex; align-items: center; gap: 0.4rem; min-width: 135px; justify-content: center;">
                <i class="ri-menu-line" style="font-size: 1.05rem;"></i> Menu
            </button>
            <ul id="plansDropdownMenu"
                style="position: absolute; top: calc(100% + 12px); right: 0; background: var(--primary-color-light); border-radius: 11px; min-width: 135px; opacity: 0; visibility: hidden; transform: translateY(-8px); transition: all 0.19s cubic-bezier(.4,1.3,.6,1); z-index: 1000; overflow: visible; border: none; box-shadow: 0 6px 22px rgba(0,0,0,0.19); padding: 0.35rem 0; list-style: none; margin: 0;">
                <li><a class="dropdown-item" href="/Gymkak/src/user/profile/profile.html"
                        style="display: flex; align-items: center; gap: 0.6rem; padding: 0.62rem 1rem; color: var(--white); text-decoration: none; font-size: 0.93rem; background: none; border-bottom: none; border-radius: 6px; transition: background 0.14s, color 0.14s;"><i
                            class="ri-user-line"
                            style="font-size: 0.98rem; color: var(--text-light); margin-right: 0.22rem; transition: color 0.14s;"></i>
                        Profile</a></li>
                <li><a class="dropdown-item" href="/Gymkak/src/user/plans/plans.html"
                        style="display: flex; align-items: center; gap: 0.6rem; padding: 0.62rem 1rem; color: var(--white); text-decoration: none; font-size: 0.93rem; background: none; border-bottom: none; border-radius: 6px; transition: background 0.14s, color 0.14s;"><i
                            class="ri-calendar-line"
                            style="font-size: 0.98rem; color: var(--text-light); margin-right: 0.22rem; transition: color 0.14s;"></i>
                        Plans</a></li>
                <li><a class="dropdown-item" href="/Gymkak/src/user/login/login.html"
                        style="display: flex; align-items: center; gap: 0.6rem; padding: 0.62rem 1rem; color: var(--white); text-decoration: none; font-size: 0.93rem; background: none; border-bottom: none; border-radius: 6px; transition: background 0.14s, color 0.14s;"><i
                            class="ri-logout-box-line"
                            style="font-size: 0.98rem; color: var(--text-light); margin-right: 0.22rem; transition: color 0.14s;"></i>
                        Logout</a></li>
            </ul>
        </div>
    </nav>

    <!-- Main Content -->
    <section class="section__container plans__container">
        <div class="plans__header">
            <h2 class="section__header">MY WORKOUT PLANS</h2>
            <p class="section__subheader">Complete 7-Day Training Schedule</p>
            <div class="plans__header-actions">
                <button class="plan__edit-btn-main" id="planEditBtnMain" type="button" title="แก้ไขชื่อวันและจำนวนเซ็ท">
                    <i class="ri-edit-line"></i> แก้ไข
                </button>
                <button class="plan__download-btn-main" id="planDownloadBtnMain" type="button"
                    title="ดาวโหลดตารางทั้งหมดเป็นภาพ">
                    <i class="ri-download-cloud-line"></i> ดาวโหลดตาราง
                </button>
            </div>
        </div>

        <!-- All Days Plan Table -->
        <div class="plan__table-wrapper" id="planTableWrapper">
            <!-- Populated by JavaScript -->
        </div>
    </section>

    <!-- Exercise Modal -->
    <div class="modal fade" id="exerciseModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content exercise-modal">
                <div class="modal-header">
                    <h5 class="modal-title" id="exerciseModalTitle">Exercise</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="exercise-modal__image">
                        <img id="exerciseModalImage" src="" alt="Exercise" />
                    </div>
                    <div class="exercise-modal__details">
                        <p id="exerciseModalProgram" class="exercise-modal__meta"></p>
                        <p id="exerciseModalDay" class="exercise-modal__meta"></p>
                        <div class="exercise-modal__stats">
                            <span id="exerciseModalSets"></span>
                            <span id="exerciseModalReps"></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Exercise Modal -->
    <div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content edit-modal">
                <div class="modal-header">
                    <h5 class="modal-title">Edit Exercise</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form class="edit-form">
                        <div class="form-group">
                            <label for="editName">Exercise Name</label>
                            <input type="text" id="editName" placeholder="Exercise name" />
                        </div>
                        <div class="form-group">
                            <label for="editSets">Sets</label>
                            <input type="number" id="editSets" placeholder="Number of sets" min="1" />
                        </div>
                        <div class="form-group">
                            <label for="editReps">Reps</label>
                            <input type="text" id="editReps" placeholder="e.g., 8-10 or 20 reps" />
                        </div>
                        <div class="form-actions">
                            <button type="button" class="btn-cancel" data-bs-dismiss="modal">Cancel</button>
                            <button type="button" class="btn-delete-modal" id="deleteExerciseBtn">Delete</button>
                            <button type="button" class="btn-save" id="saveExerciseBtn">Save</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Plan Modal -->
    <div class="modal fade" id="planEditModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content edit-modal">
                <div class="modal-header">
                    <h5 class="modal-title">แก้ไขตารางประจำวัน</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="plan-edit-list" id="planEditList"></div>
                    <div class="form-actions">
                        <button type="button" class="btn-cancel" data-bs-dismiss="modal">ยกเลิก</button>
                        <button type="button" class="btn-save" id="savePlanEditBtn">บันทึก</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Program Selection Dropdown Menu -->
    <div id="programSelectDropdown" class="program-select-dropdown"
        style="position: absolute; display: none; background: rgba(30, 30, 30, 0.98); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 6px; min-width: 180px; z-index: 2000; box-shadow: 0 8px 32px rgba(0,0,0,0.6); top: 0; left: 0;">
        <div style="padding: 0.5rem 0;">
            <button class="program-select-dropdown-item" data-program="weight"
                style="width: 100%; padding: 0.6rem 0.9rem; background: none; border: none; color: var(--white); text-align: left; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 0.6rem; font-size: 0.9rem;">
                <i class="ri-barbell-line" style="font-size: 1.1rem;"></i>Weight
            </button>
            <button class="program-select-dropdown-item" data-program="cardio"
                style="width: 100%; padding: 0.6rem 0.9rem; background: none; border: none; color: var(--white); text-align: left; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 0.6rem; font-size: 0.9rem;">
                <i class="ri-run-line" style="font-size: 1.1rem;"></i>Cardio
            </button>
            <button class="program-select-dropdown-item" data-program="calisthenics"
                style="width: 100%; padding: 0.6rem 0.9rem; background: none; border: none; color: var(--white); text-align: left; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 0.6rem; font-size: 0.9rem;">
                <i class="ri-body-scan-line" style="font-size: 1.1rem;"></i>Calisthenics
            </button>
        </div>
    </div>

    <!-- Confirmation Dialog -->
    <div id="confirmationDialog" class="confirmation-dialog">
        <div class="confirmation-dialog__overlay"></div>
        <div class="confirmation-dialog__content">
            <div class="confirmation-dialog__header">
                <i class="ri-alert-line confirmation-dialog__icon"></i>
                <h3 class="confirmation-dialog__title">ยืนยันการลบ</h3>
            </div>
            <div class="confirmation-dialog__body">
                <p class="confirmation-dialog__message" id="confirmationMessage">
                    คุณแน่ใจที่ต้องการลบรายการนี้ใช่หรือไม่?</p>
            </div>
            <div class="confirmation-dialog__actions">
                <button class="btn-confirm-cancel" id="confirmationCancel">ยกเลิก</button>
                <button class="btn-confirm-delete" id="confirmationOk">ลบ</button>
            </div>
        </div>
    </div>
    <div class="footer__bar">
        Gymkak © 2025 Web Design by yollaex.
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="exerciseData.js"></script>
    <script src="exerciseApi.js"></script>
    <script src="plans.js"></script>
</body>

</html>
