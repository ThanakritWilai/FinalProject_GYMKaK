<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/Gymkak/assets/logo_w.png" />
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.4.0/fonts/remixicon.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
    <link rel="stylesheet" href="profile.css">
    <title>Profile - Gymkak</title>
</head>

<body>
    <nav>
        <div class="nav__logo">
            <a href="/Gymkak/src/dashboard/dashboard.html"><img src="/Gymkak/assets/Logo main color w.png"
                    alt="logo" /></a>
        </div>
        <ul class="nav__links">
            <li class="link"><a href="/Gymkak/src/dashboard/dashboard.html">Home</a></li>
            <li class="link"><a href="/Gymkak/src/dashboard/dashboard.html#program">Program</a></li>
            <li class="link"><a href="/Gymkak/src/membership/regisgym/regisgym.html">Membership</a></li>
            <li class="link"><a href="/Gymkak/src/bodyanalysis/bodyanalysis.html">Bodyanalysis</a></li>
            <li class="link"><a href="/Gymkak/src/dashboard/dashboard.html#about">About</a></li>
        </ul>
        <div class="dropdown-container" style="position: relative; margin-left: 1.5rem;">
            <button class="btn redesigned-menu" id="menuButton"
                style="background: var(--primary-color-extra-light); color: var(--white); border-radius: 10px; box-shadow: 0 3px 16px rgba(0,0,0,0.16); padding: 0.48rem 1.05rem; font-size: 0.97rem; font-weight: 600; border: none; letter-spacing: 0.4px; display: flex; align-items: center; gap: 0.4rem; min-width: 135px; justify-content: center;">
                <i class="ri-menu-line" style="font-size: 1.05rem;"></i> Menu
            </button>
            <ul id="profileDropdownMenu"
                style="position: absolute; top: calc(100% + 12px); right: 0; background: var(--primary-color-light); border-radius: 11px; min-width: 135px; opacity: 0; visibility: hidden; transform: translateY(-8px); transition: all 0.19s cubic-bezier(.4,1.3,.6,1); z-index: 1000; overflow: visible; border: none; box-shadow: 0 6px 22px rgba(0,0,0,0.19); padding: 0.35rem 0; list-style: none; margin: 0;">
                <li><a class="dropdown-item" href="/Gymkak/src/user/profile/profile.html"
                        style="display: flex; align-items: center; gap: 0.6rem; padding: 0.62rem 1rem; color: var(--white); text-decoration: none; font-size: 0.93rem; background: none; border-bottom: none; border-radius: 6px; transition: background 0.14s, color 0.14s;"><i
                            class="ri-user-line"
                            style="font-size: 0.98rem; color: var(--text-light); margin-right: 0.22rem; transition: color 0.14s;"></i>
                        Profile</a></li>
                <li><a class="dropdown-item" href="/Gymkak/src/user/plans/plans.html"
                        style="display: flex; align-items: center; gap: 0.6rem; padding: 0.62rem 1rem; color: var(--white); text-decoration: none; font-size: 0.93rem; background: none; border-bottom: none; border-radius: 6px; transition: background 0.14s, color 0.14s;"><i
                            class="ri-calendar-line"
                            style="font-size: 0.98rem; color: var(--text-light); margin-right: 0.22rem; transition: color 0.14s;"></i>
                        Plans</a></li>
                <li><a class="dropdown-item" href="/Gymkak/src/user/login/login.html"
                        style="display: flex; align-items: center; gap: 0.6rem; padding: 0.62rem 1rem; color: var(--white); text-decoration: none; font-size: 0.93rem; background: none; border-bottom: none; border-radius: 6px; transition: background 0.14s, color 0.14s;"><i
                            class="ri-logout-box-line"
                            style="font-size: 0.98rem; color: var(--text-light); margin-right: 0.22rem; transition: color 0.14s;"></i>
                        Logout</a></li>
            </ul>
        </div>
    </nav>

    <!-- Main Profile Container -->
    <main class="profile-container">
        <div class="profile-wrapper">
            <!-- Profile Header Section -->
            <div class="profile-header-section">
                <div class="profile-info-header">
                    <h1 class="profile-name">Loading...</h1>
                    <p class="profile-username">@...</p>
                    <p class="profile-email">...</p>
                </div>
                <div class="profile-actions-combined">
                    <button class="btn-action btn-edit">
                        <i class="ri-edit-line"></i> Edit Profile
                    </button>
                </div>
            </div>

            <!-- Main Content - Two Columns -->
            <div class="profile-content">
                <!-- Left Column - Personal Information -->
                <div class="profile-card profile-card-left">
                    <h2 class="section-title">
                        <i class="ri-information-line"></i> Personal Information
                    </h2>
                    <div class="info-list">
                        <div class="info-item">
                            <div class="info-icon">
                                <i class="ri-at-line"></i>
                            </div>
                            <div class="info-content">
                                <span class="info-label">Username</span>
                                <span class="info-value" id="infoUsername">Loading...</span>
                            </div>
                        </div>

                        <div class="info-item">
                            <div class="info-icon">
                                <i class="ri-mail-line"></i>
                            </div>
                            <div class="info-content">
                                <span class="info-label">Email</span>
                                <span class="info-value" id="infoEmail">Loading...</span>
                            </div>
                        </div>

                        <div class="info-item">
                            <div class="info-icon">
                                <i class="ri-phone-line"></i>
                            </div>
                            <div class="info-content">
                                <span class="info-label">Phone Number</span>
                                <span class="info-value" id="infoPhone">Loading...</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Right Column - Membership Information -->
                <div class="profile-card profile-card-right">
                    <h2 class="section-title">
                        <i class="ri-vip-crown-line"></i> Membership
                    </h2>
                    <div id="membershipContainer" class="membership-plans-grid">
                        <!-- Membership content will be loaded here -->
                    </div>
                </div>
            </div>
    </main>

    <!-- Edit Profile Modal -->
    <div id="editProfileModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Edit Profile</h2>
                <button class="modal-close" id="closeModalBtn">
                    <i class="ri-close-line"></i>
                </button>
            </div>
            <div class="modal-body">
                <form id="editProfileForm">
                    <div class="form-group">
                        <label for="firstNameInput" class="form-label">
                            <i class="ri-user-line"></i> First Name
                        </label>
                        <input type="text" id="firstNameInput" class="form-input" placeholder="Enter first name" required>
                        <span class="form-error" id="firstNameError"></span>
                    </div>

                    <div class="form-group">
                        <label for="lastNameInput" class="form-label">
                            <i class="ri-user-line"></i> Last Name
                        </label>
                        <input type="text" id="lastNameInput" class="form-input" placeholder="Enter last name" required>
                        <span class="form-error" id="lastNameError"></span>
                    </div>

                    <div class="form-group">
                        <label for="phoneInput" class="form-label">
                            <i class="ri-phone-line"></i> Phone Number
                        </label>
                        <input type="tel" id="phoneInput" class="form-input" placeholder="0812345678" maxlength="10" pattern="[0-9]*">
                        <span class="form-error" id="phoneError"></span>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" id="cancelModalBtn">Cancel</button>
                <button class="btn-save" id="saveModalBtn">Save</button>
            </div>
        </div>
    </div>

    <div class="footer__bar">
        Gymkak © 2025 Web Design by yollaex.
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>
    <script src="profile.js"></script>
</body>

</html>
